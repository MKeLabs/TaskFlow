<section class="panel">
  <div class="header">
    <div>
      <h1>Projects</h1>
      <p class="muted">
        Guarded route. Requests go to <code>/api/projects</code> with <code>Authorization: Bearer</code>.
      </p>
    </div>

    <div class="right">
      <span class="token" title="JWT preview">JWT: {{ tokenPreview() }}...</span>
      <button (click)="openCreateModal()">New Project</button>
      <button (click)="load()">Refresh</button>
    </div>
  </div>

  <div class="muted" *ngIf="busy()">Loading...</div>

  <div class="error" *ngIf="error()">{{ error() }}</div>

  <ul class="list" *ngIf="!busy() && !error()">
    <li *ngFor="let p of projects()">
      <div class="item-main">
        <span class="id">#{{ p.id }}</span>
        <span class="name">{{ p.name }}</span>
      </div>
      <div class="item-actions">
        <button class="secondary small" (click)="openEditModal(p)">Edit</button>
        <button class="danger small" (click)="delete(p)">Delete</button>
      </div>
    </li>
  </ul>
</section>

<app-modal
  *ngIf="modalOpen()"
  [title]="modalTitle()"
  [description]="modalDescription()"
  [saveLabel]="modalSaveLabel()"
  [busy]="modalBusy()"
  (cancel)="closeModal()"
  (confirm)="saveModal()">
  <label class="field">
    <span>Name</span>
    <input
      #modalNameInput
      [value]="modalForm().name"
      (input)="setModalName(modalNameInput.value)"
      [disabled]="modalBusy()"
      placeholder="Project name"
    />
  </label>

  <div class="error" *ngIf="modalError()">{{ modalError() }}</div>
</app-modal>
