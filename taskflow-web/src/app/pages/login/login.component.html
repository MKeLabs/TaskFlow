<section class="card">
  <h1>Login</h1>
  <p class="muted">This calls <code>/api/auth/login</code> and stores the JWT in <code>localStorage</code>.</p>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>
      <span>Email</span>
      <input type="email" formControlName="email" autocomplete="username" />
    </label>
    <div class="error" *ngIf="emailCtrl.touched && emailCtrl.hasError('required')">Email is required.</div>
    <div class="error" *ngIf="emailCtrl.touched && emailCtrl.hasError('email')">Please enter a valid email address.</div>

    <label>
      <span>Password</span>
      <input type="password" formControlName="password" autocomplete="current-password" />
    </label>
    <div class="error" *ngIf="passwordCtrl.touched && passwordCtrl.hasError('required')">Password is required.</div>
    <div class="error" *ngIf="passwordCtrl.touched && passwordCtrl.hasError('minlength')">Password must be at least 8 characters.</div>

    <div class="error" *ngIf="error()">{{ error() }}</div>

    <div class="actions">
      <button type="submit" [disabled]="busy() || form.invalid">Sign in</button>
      <button type="button" class="secondary" (click)="register()" [disabled]="busy() || form.invalid">Register</button>
    </div>
  </form>
</section>
