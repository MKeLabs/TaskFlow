<section class="panel">
  <div class="header">
    <div>
      <h1>Tasks</h1>
      <p class="muted">
        Requests go to <code>/api/taskitems</code> with <code>Authorization: Bearer</code>.
      </p>
    </div>
    <div class="right">
      <button (click)="load()" [disabled]="busy()">Refresh</button>
    </div>
  </div>

  <!-- Create form -->
  <div class="create-panel">
    <h2>New Task</h2>

    <div class="form-row">
      <label>
        <span>Project</span>
        <select
          [ngModel]="newForm().projectId"
          (ngModelChange)="onProjectIdChange($event)"
          [disabled]="creating()">
          <option [value]="0" disabled>Select a project</option>
          <option *ngFor="let p of projects()" [value]="p.id">{{ p.name }}</option>
        </select>
      </label>

      <label>
        <span>Name</span>
        <input
          type="text"
          [ngModel]="newForm().name"
          (ngModelChange)="onNameChange($event)"
          placeholder="Task name"
          [disabled]="creating()"
        />
      </label>
    </div>

    <div class="form-row">
      <label>
        <span>Description <em>(optional)</em></span>
        <input
          type="text"
          [ngModel]="newForm().description"
          (ngModelChange)="onDescriptionChange($event)"
          placeholder="Short description"
          [disabled]="creating()"
        />
      </label>
    </div>

    <div class="form-row">
      <label>
        <span>Status</span>
        <select
          [ngModel]="newForm().status"
          (ngModelChange)="onStatusChange($event)"
          [disabled]="creating()">
          <option *ngFor="let opt of statusOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </label>

      <label>
        <span>Category</span>
        <select
          [ngModel]="newForm().category"
          (ngModelChange)="onCategoryChange($event)"
          [disabled]="creating()">
          <option *ngFor="let opt of categoryOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </label>
    </div>

    <button (click)="createTask()" [disabled]="creating() || busy()">
      {{ creating() ? 'Creating…' : 'Create task' }}
    </button>
  </div>

  <!-- Edit form -->
  <div class="create-panel" *ngIf="editing() as e">
    <div class="edit-header">
      <h2>Edit Task #{{ e.id }}</h2>
      <button class="btn-ghost" type="button" (click)="cancelEdit()">Cancel</button>
    </div>

    <div class="form-row">
      <label>
        <span>Project</span>
        <select
          [ngModel]="editForm().projectId"
          (ngModelChange)="onEditProjectIdChange($event)"
          [disabled]="saving()">
          <option [value]="0" disabled>Select a project</option>
          <option *ngFor="let p of projects()" [value]="p.id">{{ p.name }}</option>
        </select>
      </label>

      <label>
        <span>Name</span>
        <input
          type="text"
          [ngModel]="editForm().name"
          (ngModelChange)="onEditNameChange($event)"
          [disabled]="saving()"
        />
      </label>
    </div>

    <div class="form-row">
      <label>
        <span>Description <em>(optional)</em></span>
        <input
          type="text"
          [ngModel]="editForm().description"
          (ngModelChange)="onEditDescriptionChange($event)"
          [disabled]="saving()"
        />
      </label>
    </div>

    <div class="form-row">
      <label>
        <span>Status</span>
        <select
          [ngModel]="editForm().status"
          (ngModelChange)="onEditStatusChange($event)"
          [disabled]="saving()">
          <option *ngFor="let opt of statusOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </label>

      <label>
        <span>Category</span>
        <select
          [ngModel]="editForm().category"
          (ngModelChange)="onEditCategoryChange($event)"
          [disabled]="saving()">
          <option *ngFor="let opt of categoryOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </label>
    </div>

    <button (click)="saveEdit()" [disabled]="saving()">
      {{ saving() ? 'Saving…' : 'Save changes' }}
    </button>
  </div>

  <div class="error" *ngIf="error()">{{ error() }}</div>
  <div class="muted" *ngIf="busy()">Loading…</div>

  <ul class="list" *ngIf="!busy()">
    <li *ngFor="let t of tasks()">
      <div class="item-main">
        <span class="id">#{{ t.id }}</span>
        <a class="name" [routerLink]="['/tasks', t.id]">{{ t.name }}</a>
        <span class="badge">{{ statusLabels[t.status] }}</span>
        <span class="badge secondary">{{ categoryLabels[t.category] }}</span>
        <div class="item-actions">
          <button class="btn-sm" type="button"
            (click)="startEdit(t)"
            [disabled]="!!deletingId() || !!editing()">
            Edit
          </button>
          <button class="btn-sm danger" type="button"
            (click)="deleteTask(t.id)"
            [disabled]="deletingId() === t.id">
            {{ deletingId() === t.id ? '…' : 'Delete' }}
          </button>
        </div>
      </div>
      <div class="item-sub">
        <span class="muted">{{ t.projectName }}</span>
        <span class="muted" *ngIf="t.description"> — {{ t.description }}</span>
      </div>
    </li>
  </ul>
</section>
